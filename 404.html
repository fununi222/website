<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Routing Node | FunUni-lab Synthetic Edition</title>
    <!-- Synthetic Edition 404 Global Router & URL Migrator -->
    <script type="text/javascript">
      /**
       * GitHub Pages SPA 404 Fallback Router & Date-Blind Migrator
       * Handles: /website/category/2026-04-09-file.html -> /website/article.html?md=category/file.md
       */
      (function() {
        var path = window.location.pathname;
        var origin = window.location.origin;
        var repoName = path.split('/')[1] || 'website';
        
        // 1. Detect if this is a request for a potential article node
        // Pattern matches: /repo/folder/filename.html OR /repo/folder/YYYY-MM-DD-filename.html
        var htmlMatch = path.match(/\/([^\/]+\/)([^\/]+)\.html$/);
        
        if (htmlMatch) {
          var folder = htmlMatch[1]; // e.g. "ai/"
          var filename = htmlMatch[2]; // e.g. "2026-04-09-file"
          
          // 2. Normalize folder names (legacy 'it' -> 'infra', 'points' -> 'finance')
          folder = folder.replace(/^it\//, 'infra/').replace(/^points\//, 'finance/');
          
          // 3. Date-Blind Regex: Strip leading YYYY-MM-DD- if present
          var dateStrippedFilename = filename.replace(/^\d{4}-\d{2}-\d{2}-/, '');
          
          // 4. Construct the target SPA URL
          var targetMd = folder + dateStrippedFilename + ".md";
          var redirectUrl = origin + "/" + repoName + "/article.html?md=" + targetMd;
          
          console.log("SPA Router: Redirecting to stable node ->", redirectUrl);
          window.location.replace(redirectUrl);
        } else {
          // 5. Fallback for non-HTML paths or broken links: Return to Portal Home
          console.log("SPA Router: Path unrecognized, returning to Portal Home");
          window.location.replace(origin + "/" + repoName + "/index.html");
        }
      })();
    </script>
  </head>
  <body style="background-color: #060e20; color: #aaa4ff; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh;">
    Initiating Synthetic Node Redirection Protocol...
  </body>
</html>
