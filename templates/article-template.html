<!DOCTYPE html>
<html class="dark" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} | FunUni-lab Synthetic Edition</title>
    <!-- Core Frameworks -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <!-- Markdown Engine & Security -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    
    <!-- Syntax Highlighting (Prism.js) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-powershell.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'primary': '#aaa4ff',
                        'primary-dim': '#6a5cf9',
                        'secondary': '#00d2ff',
                        'tertiary': '#b0aaff',
                        'background': '#060e20',
                        'surface': '#0f1930',
                        'surface-container': '#141f38',
                        'on-surface': '#dee5ff',
                        'on-surface-variant': '#a3aac4',
                        'outline': '#6d758c'
                    },
                    fontFamily: {
                        headline: ['Space Grotesk'],
                        body: ['Inter']
                    }
                }
            }
        }
    </script>
    <style>
        .cyber-glow { box-shadow: 0 0 40px rgba(108, 92, 231, 0.04); }
        .mesh-gradient {
            background-image:
                radial-gradient(at 0% 0%, rgba(170, 164, 255, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(0, 210, 255, 0.05) 0px, transparent 50%);
        }
        /* Custom Prostyle for SME content */
        #sme-content {
            font-family: 'Inter', sans-serif;
            color: #a3aac4;
            font-size: 0.9rem;
            line-height: 1.8;
        }
        #sme-content h1, #sme-content h2, #sme-content h3 {
            font-family: 'Space Grotesk', sans-serif;
            color: #dee5ff;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }
        #sme-content h1 { font-size: 2.5rem; border-left: 4px solid #00d2ff; padding-left: 1rem; }
        #sme-content h2 { font-size: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.5rem; }
        #sme-content h3 { font-size: 1.1rem; color: #aaa4ff; }
        #sme-content p { margin-bottom: 1.25rem; }
        #sme-content ul { list-style: circle; padding-left: 1.5rem; margin-bottom: 1.25rem; }
        #sme-content blockquote { border-left: 4px solid #aaa4ff; padding-left: 1rem; font-style: italic; color: #828a9c; }
        #sme-content code { background: rgba(170, 164, 255, 0.1); color: #aaa4ff; padding: 2px 5px; border-radius: 4px; font-family: monospace; }
        #sme-content pre code { background: none; color: inherit; padding: 0; }
        #sme-content img { border-radius: 12px; margin: 2rem 0; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col selection:bg-primary/30 selection:text-primary overflow-x-hidden mesh-gradient">
    <!-- Top Nav -->
    <nav class="fixed top-0 z-50 flex justify-between items-center px-8 h-16 w-full bg-surface/60 backdrop-blur-xl border-b border-white/5 transition-all duration-300 ease-out font-headline tracking-tight shadow-lg">
        <div class="flex items-center gap-8">
            <a class="text-xl font-bold tracking-tighter text-primary" href="../index.html">FunUni-lab.js</a>
            <div class="hidden md:flex items-center gap-6 text-[10px] uppercase tracking-widest font-bold">
                <a class="text-on-surface-variant hover:text-secondary transition-colors" href="../it/index.html">Infrastructure</a>
                <a class="text-on-surface-variant hover:text-secondary transition-colors" href="../points/index.html">Finance</a>
                <a class="text-on-surface-variant hover:text-secondary transition-colors" href="../ai/index.html">AI & Agents</a>
                <a class="text-on-surface-variant hover:text-secondary transition-colors" href="../lpo/index.html">LPO</a>
                <a class="text-on-surface-variant hover:text-secondary transition-colors" href="../glossary.html">Glossary</a>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-xs font-bold text-secondary uppercase tracking-widest hidden sm:block">Dynamic Content Active</span>
            <span class="material-symbols-outlined text-secondary">database</span>
        </div>
    </nav>

    <!-- Sidebar -->
    <aside class="h-screen w-64 fixed left-0 top-0 hidden lg:flex flex-col py-20 px-4 space-y-2 bg-surface z-40 border-r border-white/5">
        <div class="mb-8 px-4">
            <div class="text-primary font-bold text-xs uppercase tracking-widest font-headline">CONTENT_ENGINE</div>
            <div class="text-slate-500 text-[10px] uppercase tracking-widest font-body mt-1">v1.0.0-sme</div>
        </div>
        <nav class="flex-1 space-y-1">
            <a class="flex items-center gap-3 py-2.5 px-4 text-slate-500 hover:bg-surface-container hover:text-primary transition-all hover:translate-x-1 duration-200" href="index.html">
                <span class="material-symbols-outlined text-lg">arrow_back</span>
                <span class="font-headline text-[10px] uppercase tracking-widest">Back to Index</span>
            </a>
            <hr class="border-white/5 my-2">
            <div class="px-4 py-2 text-[10px] text-slate-500 uppercase tracking-widest font-bold">In-Post Navigation</div>
            <!-- Dynamic Navigation can be added here or generated by SME -->
        </nav>
    </aside>

    <main class="lg:pl-64 pt-20 flex-grow">
        <article class="max-w-4xl mx-auto px-8 py-12">
            <!-- Dynamic Injection Point -->
            <div id="sme-content" data-src="{{POST_MD_PATH}}">
                <!-- Loading State (Cyberpunk Style) -->
                <div class="p-8 border border-primary/20 bg-primary/5 rounded-2xl animate-pulse">
                    <span class="text-[10px] font-bold text-primary uppercase tracking-[0.2em]">Accessing Data Stream...</span>
                    <div class="h-4 bg-white/5 rounded mt-4 w-3/4"></div>
                    <div class="h-4 bg-white/5 rounded mt-2 w-1/2"></div>
                </div>
            </div>
        </article>
    </main>

    <footer class="lg:pl-64 w-full py-12 px-8 mt-auto bg-background/50 backdrop-blur-sm font-body text-xs border-t border-white/5">
        <div class="max-w-7xl mx-auto text-center opacity-60 hover:opacity-100 transition-opacity">
            <span class="text-secondary block font-bold mb-2 tracking-widest lowercase">// content.dynamically_rendered</span>
            <div class="flex justify-center gap-6">
                <a href="../index.html" class="hover:text-primary transition-colors uppercase tracking-[0.2em]">Portal_Home</a>
                <a href="../glossary.html" class="hover:text-primary transition-colors uppercase tracking-[0.2em]">System_Glossary</a>
            </div>
        </div>
    </footer>

    <!-- Synthetic Content Engine Loader -->
    <script src="../assets/js/sme.js"></script>
</body>
</html>
