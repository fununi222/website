    <script src="../assets/js/sme.js"></script>
    <script>
        window.addEventListener('sme-loaded', () => {
            const table = document.querySelector('#sme-content table');
            if (!table) return;

            // 1. Styling the Table
            table.classList.add('w-full', 'text-left', 'border-collapse', 'mt-6');
            table.querySelectorAll('th').forEach(th => {
                th.classList.add('p-3', 'border-b', 'border-white/10', 'text-slate-400', 'font-bold', 'cursor-pointer', 'hover:text-secondary', 'transition-colors', 'select-none');
                th.innerHTML += ' <span class="text-xs opacity-50 ml-1">↕</span>';
            });
            table.querySelectorAll('td').forEach(td => td.classList.add('p-3', 'border-b', 'border-white/5', 'text-on-surface-variant', 'text-sm'));
            table.querySelectorAll('tr').forEach(tr => tr.classList.add('hover:bg-surface-container-high/50', 'transition-colors'));

            // 2. Inject Search Control Above Text
            const controlDiv = document.createElement('div');
            controlDiv.className = 'mb-6 mt-4 fade-in';
            controlDiv.innerHTML = '<input type="text" id="glossary-search" placeholder="カテゴリーや用語でフィルター検索... (例: AI, 運用)" class="w-full max-w-sm px-4 py-2 bg-surface-container border border-white/5 rounded-lg text-on-surface focus:outline-none focus:border-secondary/50 focus:ring-1 focus:ring-secondary/50 placeholder-slate-500 font-body text-sm transition-all focus:bg-surface-container-highest shadow-inner">';
            table.parentNode.insertBefore(controlDiv, table);

            // 3. Search Logic
            const searchInput = document.getElementById('glossary-search');
            const tbody = table.querySelector('tbody');
            const rows = Array.from(tbody.querySelectorAll('tr'));
            
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                let visibleCount = 0;
                rows.forEach(row => {
                    const text = row.textContent.toLowerCase();
                    if (text.includes(query)) {
                        row.style.display = '';
                        visibleCount++;
                    } else {
                        row.style.display = 'none';
                    }
                });
                
                // Remove existing empty state message if any
                const existingMsg = tbody.querySelector('.empty-state-msg');
                if (existingMsg) existingMsg.remove();
                
                if (visibleCount === 0) {
                    const tr = document.createElement('tr');
                    tr.className = 'empty-state-msg';
                    tr.innerHTML = `<td colspan="${table.querySelectorAll('th').length}" class="p-8 text-center text-on-surface-variant">「${e.target.value}」に一致する用語は見つかりませんでした。</td>`;
                    tbody.appendChild(tr);
                }
            });

            // 4. Sort Logic
            const headers = table.querySelectorAll('th');
            let currentSortCol = -1;
            let asc = true;

            headers.forEach((th, index) => {
                th.addEventListener('click', () => {
                    asc = currentSortCol === index ? !asc : true;
                    currentSortCol = index;

                    headers.forEach(h => h.querySelector('span').textContent = '↕');
                    th.querySelector('span').textContent = asc ? '↓' : '↑';

                    const sortedRows = rows.sort((a, b) => {
                        const aText = a.children[index].textContent.trim();
                        const bText = b.children[index].textContent.trim();
                        return asc ? aText.localeCompare(bText, 'ja') : bText.localeCompare(aText, 'ja');
                    });

                    // Remove empty message if present before re-appending
                    const existingMsg = tbody.querySelector('.empty-state-msg');
                    if (existingMsg) existingMsg.remove();

                    tbody.innerHTML = '';
                    sortedRows.forEach(row => tbody.appendChild(row));
                });
            });
        });
    </script>
</body>
